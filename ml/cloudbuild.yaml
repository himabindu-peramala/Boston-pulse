# Cloud Build config for the ML training image.
#
# The Dockerfile lives at ml/docker/ml-training.Dockerfile and expects the
# repository root as its build context (it COPYs ml/models, ml/shared,
# ml/configs). `gcloud builds submit --tag` cannot do that, so we use this
# config file instead.
#
# Usage (from repo root):
#   gcloud builds submit . \
#     --config=ml/cloudbuild.yaml \
#     --substitutions=_IMAGE=us-east1-docker.pkg.dev/PROJECT/ml-images/ml-training:latest

substitutions:
  _IMAGE: "us-east1-docker.pkg.dev/PROJECT/ml-images/ml-training:latest"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - ml/docker/ml-training.Dockerfile
      - -t
      - ${_IMAGE}
      - .

images:
  - ${_IMAGE}

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
