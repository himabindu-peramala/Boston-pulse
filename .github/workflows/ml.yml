# Boston Pulse ML Training Pipeline CI/CD

name: ML Training Pipeline CI/CD

on:
  push:
    paths:
      - 'ml/**'
      - '.github/workflows/ml.yml'
    branches:
      - main
      - 'feature/**'
  pull_request:
    paths:
      - 'ml/**'
      - '.github/workflows/ml.yml'
  workflow_dispatch:
    inputs:
      execution_date:
        description: 'Execution date (YYYY-MM-DD) — defaults to today'
        required: false
      skip_training:
        description: 'Skip training and only run tests'
        required: false
        default: false
        type: boolean
  schedule:
    # Weekly Sunday 2 AM UTC — same as Airflow DAG schedule
    # GitHub Actions triggers Airflow via REST API; Airflow does the actual work
    - cron: '0 2 * * 0'

env:
  PYTHON_VERSION: '3.11'
  MLFLOW_TRACKING_URI: 'sqlite:///mlflow_test.db'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff black mypy

      - name: Run ruff linter
        run: ruff check ml/
        continue-on-error: false

      - name: Check black formatting
        run: black --check ml/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ml/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ml
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        working-directory: ml
        run: |
          pytest tests/unit/ -v \
            --cov=models \
            --cov=shared \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ml/coverage.xml
          flags: ml-unit-tests
          name: ml-coverage
        continue-on-error: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      USE_GCS_EMULATOR: 'true'
      STORAGE_EMULATOR_HOST: 'http://localhost:4443'
    services:
      gcs-emulator:
        image: fsouza/fake-gcs-server
        ports:
          - 4443:4443
        options: >-
          --health-cmd "curl -f http://localhost:4443/storage/v1/b || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ml
        run: pip install -e ".[dev]"

      - name: Wait for GCS emulator
        run: |
          for i in {1..30}; do
            curl -s http://localhost:4443/storage/v1/b && break
            sleep 2
          done

      - name: Run integration tests
        working-directory: ml
        run: pytest tests/integration/ -v --timeout=300
        continue-on-error: true  # Integration tests may need fixtures

  trigger-training:
    name: Trigger Training DAG
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_training != 'true')
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token'
        continue-on-error: true  # Skip if secrets not configured

      - name: Trigger Airflow DAG
        if: ${{ env.AIRFLOW_URL != '' && steps.auth.outputs.access_token != '' }}
        env:
          AIRFLOW_URL: ${{ secrets.AIRFLOW_URL }}
          GCP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          EXEC_DATE="${{ github.event.inputs.execution_date || '' }}"
          if [ -z "$EXEC_DATE" ]; then
            EXEC_DATE=$(date +%Y-%m-%d)
          fi

          echo "Triggering crime_navigate_train DAG for $EXEC_DATE"

          curl -sf -X POST \
            -H "Authorization: Bearer $GCP_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "$AIRFLOW_URL/api/v1/dags/crime_navigate_train/dagRuns" \
            -d "{\"conf\": {\"git_sha\": \"$GITHUB_SHA\", \"execution_date\": \"$EXEC_DATE\"}}" \
            || echo "Note: Airflow trigger skipped (secrets not configured or Airflow not available)"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - name: Send Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "✅ ML Pipeline CI passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *ML Pipeline CI passed*\n\nCommit: `'"$GITHUB_SHA"'`\nBranch: `'"$GITHUB_REF_NAME"'`"
                  }
                }
              ]
            }' || echo "Slack notification skipped"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Send Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "❌ ML Pipeline CI failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *ML Pipeline CI failed*\n\nCommit: `'"$GITHUB_SHA"'`\nBranch: `'"$GITHUB_REF_NAME"'`\n\n<'"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'|View workflow run>"
                  }
                }
              ]
            }' || echo "Slack notification skipped"
